<div class="min-h-[200px]">
    @if (loading) {
    <div class="flex justify-center py-8">
        <app-spinner></app-spinner>
    </div>
    } @else {
    @for (p of publications; track p.id || $index) {
    <div class="mb-4 rounded-xl bg-gray-900/60 border-2 border-gray-700 shadow-md hover:bg-gray-900/80 transition">
        <app-publication [publication]="p">
        </app-publication>
    </div>
    } @empty {
    <div
        class="text-center text-gray-500 py-10 bg-gray-900/40 rounded-xl justify-center items-center border border-gray-800 p-2">
        No hay publicaciones aún.
    </div>
    }
    }
</div>
