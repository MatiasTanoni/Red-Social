<div class="p-4 rounded-lg shadow mb-4 flex flex-col gap-3">

    <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-3">
            <img [src]="publication.image_url || 'assets/default-avatar.png'"
                class="w-10 h-10 rounded-full object-cover shadow-md border border-gray-600">
            <span class="text-sm text-gray-200 font-medium hover:underline cursor-pointer">
                {{ publication.username }}
            </span>
        </div>

        <span class="text-xs text-gray-500">
            {{ publication.date | date:'dd/MM/yyyy HH:mm' }}
        </span>
    </div>

    <p class="text-gray-100 text-sm overflow-hidden text-ellipsis line-clamp-3 break-words font-light mb-2">
        {{ publication.content }}
    </p>

    @if (publication.imagePost) {
    <img [src]="publication.imagePost" class=" h-48  w-48 object-cover rounded-xl border border-gray-700 mb-3">
    }

    <div class="flex justify-between items-center mt-auto pt-2 border-t border-gray-700/50">

        <button (click)="onLike(publication._id, idUser)"
            class="group flex items-center gap-1.5 py-1.5 rounded-full transition-all duration-200 active:scale-95 hover:bg-red-500/10">

            @if (publication.likes.includes(idUser)) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                class="w-5 h-5 text-red-500">
                <path
                    d="m11.645 20.91-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3.25 7.75 3.25c2.1 0 3.815 1.5 4.75 3.514.935-2.014 2.65-3.514 4.75-3.514 3.036 0 5.5 2.072 5.5 5.002 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z" />
            </svg>
            <span class="text-sm font-medium text-red-500">
                {{ publication.likes.length }}
            </span>
            }
            @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 text-gray-400 group-hover:text-red-500 transition-colors">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg>
            <span class="text-sm font-medium text-gray-400 group-hover:text-red-500 transition-colors">
                {{ publication.likes.length }}
            </span>
            }
        </button>

        @if (itsOwnProfile) {
        <button (click)="onDelete()"
            class="flex items-center gap-1 text-xs font-medium text-gray-400 hover:text-red-400 transition-colors px-2 py-1 rounded hover:bg-red-500/10">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
            Eliminar
        </button>
        }
    </div>

</div>
