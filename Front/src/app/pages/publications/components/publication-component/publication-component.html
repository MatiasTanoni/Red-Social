<div class="p-4 rounded-lg shadow mb-4 h-40 overflow-hidden flex flex-col justify-between">

    <div class="flex justify-between items-center mb-3">

        <div class="flex items-center gap-3">
            <img [src]="publication.image_url || 'assets/default-avatar.png'"
                class="w-10 h-10 rounded-full object-cover shadow-md">
            <span class="text-sm text-gray-300 font-medium">
                {{ publication.username }}
            </span>
        </div>

        <span class="text-xs text-gray-500">
            {{ publication.date | date:'dd/MM/yyyy HH:mm' }}
        </span>

    </div>


    <p class="text-white mb-3 overflow-hidden text-ellipsis line-clamp-3 break-words">
        {{ publication.content }}
    </p>


    <div class="flex justify-between items-center mt-auto">
        <button (click)="onLike(publication._id, idUser)"
            class="text-sm px-3 py-1 rounded bg-blue-600 hover:bg-blue-700 transition">
            @if (publication.likes.includes(idUser)) {
            💔
            }
            @else {
            ❤️
            }
            ({{ publication.likes.length }})
        </button>

        @if (itsOwnProfile) {
        <button (click)="onDelete()" class="text-sm px-3 py-1 rounded bg-red-600 hover:bg-red-700 transition">
            🗑 Eliminar
        </button>
        }
    </div>

</div>
