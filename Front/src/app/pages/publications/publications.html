<div class="container mx-auto p-4 text-white">
    <div class="flex items-start gap-4">
        <img src="" class="w-12 h-12 rounded-full object-cover" alt="Avatar" />

        <div class="flex-1">
            <textarea [(ngModel)]="text" placeholder="¿Qué está pasando?" maxlength="140"
                class="bg-transparent w-full text-white resize-none outline-none text-base placeholder-gray-400"
                rows="3"></textarea>

            <div class="mt-4 flex flex-wrap gap-2 relative">
                <div class="relative w-24 h-24">
                    <!-- <img *ngIf="imagePreview" [src]="imagePreview"
                        class="w-full h-full object-cover rounded-lg border border-gray-700" /> -->
                    <button (click)="removeImage()"
                        class="absolute top-0 right-0 bg-black bg-opacity-70 text-white px-2 py-1 rounded-full hover:bg-red-600 transition">
                        ✕
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-end gap-2">

                <label class="cursor-pointer mt-2">
                    <!-- <i class="material-icons hover:text-blue-500 text-white transition">image</i> -->
                    <!-- <input type="file" (change)="onImageSelected($event)" hidden accept="image/*" /> -->
                </label>

                <button
                    class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-full font-medium disabled:opacity-50 transition cursor-pointer"
                    [disabled]="!text === null" (click)="post()">
                    Publicar
                </button>

            </div>
        </div>
    </div>
    <div class="flex justify-between mb-4">
        <h2 class="text-2xl font-semibold">Publicaciones</h2>

        <select [(ngModel)]="orderBy" (change)="changeOrder(orderBy)"
            class="bg-gray-800 border border-gray-600 rounded px-2 py-1">
            <option value="fecha">Ordenar por fecha</option>
            <option value="likes">Ordenar por me gusta</option>
        </select>
    </div>

    @if (loading) {
    <div class="text-center text-gray-400">Cargando...</div>
    }

    @for (p of publications; track $index) {
    <app-publication [publication]="p" (like)="manageLike($event)" (delete)="manageDelete($event)">
    </app-publication>
    }

    <div class="flex justify-between mt-6">
        <button (click)="anteriorPagina()" [disabled]="page===1" class="px-4 py-2 bg-gray-700 rounded">Anterior</button>
        <button (click)="siguientePagina()" class="px-4 py-2 bg-gray-700 rounded">Siguiente</button>
    </div>
</div>
