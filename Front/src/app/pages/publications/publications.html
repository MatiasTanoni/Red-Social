<div class="container mx-auto p-4 text-white relative max-w-6xl">

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">

        <div class="lg:col-span-4 top-4">
            <div class="bg-gray-900/80 backdrop-blur-xl shadow-lg border-2 border-gray-700 w-full rounded-xl p-4">

                <h3 class="text-lg font-semibold mb-4 text-gray-300">Crear publicación</h3>

                <div class="flex items-start gap-4">
                    <img [src]="profileImage || 'assets/default-avatar.png'"
                        class="w-12 h-12 rounded-full object-cover shadow-md" alt="Avatar" />

                    <div class="flex-1">
                        <textarea [(ngModel)]="text" placeholder="¿Qué está pasando?" maxlength="140" rows="4"
                            class="bg-gray-800/40 w-full text-white resize-none outline-none text-base placeholder-gray-400 rounded-xl p-3 border border-gray-700 focus:border-blue-500 transition">
                        </textarea>
                    </div>
                </div>

                <div class="flex items-center justify-end mt-3">
                    <button
                        class="bg-white text-black hover:bg-gray-200 px-5 py-2 rounded-full font-semibold disabled:opacity-50 transition shadow-md w-full sm:w-auto"
                        [disabled]="!text || text.trim().length === 0" (click)="post()">
                        Publicar
                    </button>
                </div>

            </div>
        </div>

        <div class="lg:col-span-8 space-y-4 w-200">

            <div
                class="flex flex-col sm:flex-row justify-between items-center bg-gray-900/60 p-3 rounded-xl border border-gray-700 backdrop-blur-sm gap-3 sm:gap-0">
                <h2 class="text-xl font-semibold tracking-wide px-2">Publicaciones</h2>

                <select [(ngModel)]="orderBy" (change)="changeOrder(orderBy)"
                    class="bg-gray-800/60 border border-gray-600 rounded-xl px-3 py-1 text-sm shadow focus:outline-none focus:border-blue-500 transition cursor-pointer sm:w-auto">
                    <option value="fecha">Más recientes</option>
                    <option value="likes">Más populares</option>
                </select>
            </div>

            <div class="min-h-[200px]">
                @if (loading) {
                <div class="flex justify-center py-8">
                    <app-spinner></app-spinner>
                </div>
                } @else {
                @for (p of publications; track p.id || $index) {
                <div
                    class="mb-4 rounded-xl bg-gray-900/60 border-2 border-gray-700 shadow-md hover:bg-gray-900/80 transition">
                    <app-publication [publication]="p" (like)="manageLike($event)" (delete)="manageDelete($event)">
                    </app-publication>
                </div>
                } @empty {
                <div class="text-center text-gray-500 py-10 bg-gray-900/40 rounded-xl border border-gray-800">
                    No hay publicaciones aún.
                </div>
                }
                }
            </div>

            <div class="bg-gray-900/90 backdrop-blur-xl border-2 border-gray-700 
                  flex justify-between items-center w-full p-3 shadow-lg rounded-xl">

                <button (click)="anteriorPagina()" [disabled]="page === 1 || loading"
                    class="px-4 py-2 text-black rounded-full bg-white hover:bg-gray-200 disabled:opacity-40 disabled:cursor-not-allowed transition font-medium shadow text-sm sm:text-base">
                    Anterior
                </button>

                <span class="text-gray-400 text-sm font-medium">Página {{ page }}</span>

                <button (click)="siguientePagina()" [disabled]="loading || publications.length < limit"
                    class="px-4 py-2 text-black rounded-full bg-white hover:bg-gray-200 disabled:opacity-40 disabled:cursor-not-allowed transition font-medium shadow text-sm sm:text-base">
                    Siguiente
                </button>

            </div>
        </div>

    </div>
</div>
