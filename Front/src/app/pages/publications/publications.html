<!-- <div class="container mx-auto p-4 text-white relative"> -->

<div class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-sm py-4 mb-6 border-b border-gray-700 w-full">
    <div class="flex items-start gap-4">
        <img [src]="profileImage || 'assets/default-avatar.png'" class="w-12 h-12 rounded-full object-cover"
            alt="Avatar" />

        <div class="flex-1">
            <textarea [(ngModel)]="text" placeholder="¿Qué está pasando?" maxlength="140"
                class="bg-transparent w-full text-white resize-none outline-none text-base placeholder-gray-400"
                rows="3"></textarea>

            <!-- Previsualización de imagen (si existiera lógica) -->
            <div class="mt-4 flex flex-wrap gap-2 relative">
                <div class="relative w-24 h-24" *ngIf="false"> <!-- Oculto por ahora -->
                    <button (click)="removeImage()"
                        class="absolute top-0 right-0 bg-black bg-opacity-70 text-white px-2 py-1 rounded-full hover:bg-red-600 transition">
                        ✕
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-end gap-2 mt-2">
                <button
                    class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-full font-medium disabled:opacity-50 transition cursor-pointer"
                    [disabled]="!text || text.trim().length === 0" (click)="post()">
                    Publicar
                </button>
            </div>
        </div>
    </div>

    <!-- Filtros dentro del header sticky para que también estén siempre visibles -->
    <div class="flex justify-between items-center mt-4 pt-2">
        <h2 class="text-xl font-semibold">Publicaciones</h2>

        <select [(ngModel)]="orderBy" (change)="changeOrder(orderBy)"
            class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm focus:outline-none focus:border-blue-500">
            <option value="fecha">Más recientes</option>
            <option value="likes">Más populares</option>
        </select>
    </div>
</div>

<!-- LISTA DE PUBLICACIONES -->
<div class="space-y-4 min-h-[200px]"> <!-- min-h para evitar saltos bruscos -->

    @if (loading) {
    <div class="flex justify-center py-8">
        <app-spinner></app-spinner>
    </div>
    } @else {
    @for (p of publications; track p.id || $index) { <!-- track por ID es mejor performance -->
    <app-publication [publication]="p" (like)="manageLike($event)" (delete)="manageDelete($event)">
    </app-publication>
    } @empty {
    <div class="text-center text-gray-500 py-10">
        No hay publicaciones aún.
    </div>
    }
    }
</div>

<!-- PAGINACIÓN -->
<div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-800 sticky bottom-0 bg-gray-900 p-2 z-40">
    <button (click)="anteriorPagina()" [disabled]="page === 1 || loading"
        class="px-4 py-2 bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed rounded transition">
        Anterior
    </button>

    <span class="text-gray-400 text-sm">Página {{page}}</span>

    <!-- Deshabilitamos siguiente si trajo menos de 3 items, significa que no hay más -->
    <button (click)="siguientePagina()" [disabled]="loading || publications.length < limit"
        class="px-4 py-2 bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed rounded transition">
        Siguiente
    </button>
</div>
